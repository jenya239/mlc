openapi: 3.0.3
info:
  title: Mini Petstore
  version: 1.0.0
paths:
  /pets/{petId}:
    get:
      operationId: getPetById
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets:
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
components:
  schemas:
    PetStatus:
      type: string
      enum: [available, pending, sold]
    Tag:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    NewPet:
      type: object
      required: [name]
      properties:
        name:
          type: string
        tag:
          $ref: "#/components/schemas/Tag"
        status:
          $ref: "#/components/schemas/PetStatus"
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          $ref: "#/components/schemas/Tag"
        status:
          $ref: "#/components/schemas/PetStatus"
        photoUrls:
          type: array
          items:
            type: string
    PetOrError:
      oneOf:
        - $ref: "#/components/schemas/Pet"
        - type: object
          required: [message]
          properties:
            message:
              type: string
