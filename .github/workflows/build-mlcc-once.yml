# One-off mlcc build smoke: cold Ruby bootstrap, check-only, upload binary.
# Trigger: Actions ? Build mlcc once ? Run workflow.
name: Build mlcc once

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MLC_CXX: ccache clang++
      MLC_JOBS: 4
      CCACHE_MAXSIZE: 500M
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_SLOPPINESS: pch_defines,time_macros
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ toolchain (clang, ccache, mold)
        run: sudo apt-get update && sudo apt-get install -y clang ccache mold g++ libxcb1-dev libcairo2-dev libx11-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build mlcc (cold via Ruby)
        run: |
          /usr/bin/time -f 'build_sec=%e' env MLCC_FORCE_RUBY=1 compiler/build.sh

      - name: Smoke check-only
        run: compiler/out/mlcc --check-only compiler/main.mlc

      - name: ccache stats
        run: ccache -s

      - name: Upload mlcc binary
        uses: actions/upload-artifact@v4
        with:
          name: mlcc-linux-x64
          path: compiler/out/mlcc
          retention-days: 7
