# Долгая проверка: mlcc → bs1 → g++ → mlcc2 → bs2 → mlcc3 → bs3 → diff(bs2, bs3).
# Запуск только вручную (workflow_dispatch).
name: Triple bootstrap

on:
  workflow_dispatch:

jobs:
  triple-bootstrap:
    runs-on: ubuntu-latest
    env:
      MLC_CXX: ccache clang++
      CCACHE_MAXSIZE: 500M
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_SLOPPINESS: pch_defines,time_macros
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ toolchain (clang, ccache, mold)
        run: sudo apt-get update && sudo apt-get install -y clang ccache mold g++

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build mlcc (cold start via Ruby)
        run: MLCC_FORCE_RUBY=1 compiler/build.sh

      - name: Triple-bootstrap (bs2 must equal bs3)
        run: compiler/triple_bootstrap.sh compiler/out/mlcc

      - name: ccache stats
        run: ccache -s
