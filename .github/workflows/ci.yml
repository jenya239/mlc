# Обязательный минимум: Ruby unit + self-hosted compiler/tests.
# Ruby lib/mlc остаётся эталоном и резервом (см. docs/SELF_HOSTED_PLAN.md).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-and-compiler-tests:
    runs-on: ubuntu-latest
    env:
      MLC_CXX: ccache clang++
      CCACHE_MAXSIZE: 500M
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_SLOPPINESS: pch_defines,time_macros
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ toolchain (clang, ccache, mold)
        run: sudo apt-get update && sudo apt-get install -y clang ccache mold g++

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Ruby unit tests (test/ except integration)
        run: bundle exec rake test_unit

      - name: Self-hosted compiler tests
        run: compiler/tests/build_tests.sh

      - name: Download bootstrap mlcc binary
        run: |
          gh release download --repo jenya239/mlc --pattern 'mlcc' --dir compiler/out/ \
            $(gh release list --repo jenya239/mlc --limit 1 | awk '{print $3}')
          chmod +x compiler/out/mlcc
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build mlcc (self-hosted, Ruby fallback if stale)
        run: compiler/build.sh

      - name: Bootstrap link smoke (mlcc_bootstrap)
        run: MLCC_BOOTSTRAP=1 MLC_REQUIRE_BOOTSTRAP_LINK=1 compiler/build.sh

      - name: ccache stats
        run: ccache -s

      - name: Profile regression
        run: benchmarks/profile/compare_baseline.sh

  concurrency-sanitize:
    runs-on: ubuntu-latest
    env:
      MLC_CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Concurrency sanitizer gate (asan/ubsan/tsan)
        run: scripts/concurrency_sanitize_gate.sh

  gl-loader-smoke:
    runs-on: ubuntu-latest
    env:
      MLC_CXX: clang++
      TMPDIR: ${{ github.workspace }}/tmp
    steps:
      - uses: actions/checkout@v4

      - name: Install clang + Mesa EGL + FreeType (headless llvmpipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config \
            libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
            mesa-utils libgl1-mesa-dri \
            libfreetype-dev libharfbuzz-dev fonts-dejavu-core

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Download bootstrap mlcc binary
        run: |
          mkdir -p compiler/out tmp
          gh release download --repo jenya239/mlc --pattern 'mlcc' --dir compiler/out/ \
            $(gh release list --repo jenya239/mlc --limit 1 | awk '{print $3}')
          chmod +x compiler/out/mlcc
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build mlcc (self-hosted, Ruby fallback if stale)
        run: compiler/build.sh

      - name: EGL glGenBuffers loader smoke
        run: compiler/tests/run_gl_loader_smoke.sh

      - name: TextRenderer A8 FBO pixel-diff smoke
        run: compiler/tests/run_text_renderer_a8_smoke.sh

      - name: TextRenderer A8 shaped-string golden smoke
        run: compiler/tests/run_text_renderer_a8_string_smoke.sh

      - name: MSDF/SDF RGB8 glyph smoke
        run: compiler/tests/run_msdf_glyph_smoke.sh

      - name: MSDF median shader FBO smoke
        run: compiler/tests/run_msdf_renderer_smoke.sh

      - name: RenderMode A8/MSDF switch smoke
        run: compiler/tests/run_render_mode_smoke.sh
