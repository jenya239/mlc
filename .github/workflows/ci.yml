# Обязательный минимум: Ruby unit + self-hosted compiler/tests.
# Ruby lib/mlc остаётся эталоном и резервом (см. docs/SELF_HOSTED_PLAN.md).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-and-compiler-tests:
    runs-on: ubuntu-latest
    env:
      MLC_CXX: ccache clang++
      CCACHE_MAXSIZE: 500M
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ toolchain (clang, ccache, mold)
        run: sudo apt-get update && sudo apt-get install -y clang ccache mold g++

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('compiler/**/*.mlc', 'runtime/**/*.hpp', 'runtime/**/*.cpp') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Ruby unit tests (test/ except integration)
        run: bundle exec rake test_unit

      - name: Self-hosted compiler tests
        run: compiler/tests/build_tests.sh

      - name: Download bootstrap mlcc binary
        run: |
          gh release download --repo jenya239/mlc --pattern 'mlcc' --dir compiler/out/ \
            $(gh release list --repo jenya239/mlc --limit 1 | awk '{print $3}')
          chmod +x compiler/out/mlcc
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build mlcc (self-hosted, Ruby fallback if stale)
        run: compiler/build.sh

      - name: Bootstrap link smoke (mlcc_bootstrap)
        run: MLCC_BOOTSTRAP=1 MLC_REQUIRE_BOOTSTRAP_LINK=1 compiler/build.sh

      - name: ccache stats
        run: ccache -s

      - name: Profile regression
        run: benchmarks/profile/compare_baseline.sh
